<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Double Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px 36px; max-width: 420px; width: 100%; }
    .logo { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    .logo span { color: #2563eb; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p.sub { color: #64748b; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .15s; margin-bottom: 16px; }
    input:focus { border-color: #2563eb; }
    button { width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .msg { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
    .msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .back { display: inline-block; margin-top: 20px; color: #2563eb; font-size: 14px; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Double <span>Check</span></div>
    <h1>Set a new password</h1>
    <p class="sub">Enter a new password for your account. You'll be able to sign in with it straight away.</p>

    <form id="resetForm">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6" />
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your new password" required minlength="6" />
      <button type="submit" id="submitBtn">Update password</button>
    </form>

    <div id="msg" class="msg"></div>
    <a href="/" class="back">← Back to Double Check</a>
  </div>

  <script>
    const API = "https://web-production-970ba.up.railway.app";

    function getToken() {
      return new URLSearchParams(window.location.search).get("token") || "";
    }

    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "msg " + type;
    }

    document.getElementById("resetForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const np = document.getElementById("newPassword").value;
      const cp = document.getElementById("confirmPassword").value;
      const token = getToken();

      if (!token) { showMsg("Invalid or missing reset token. Please request a new reset link.", "error"); return; }
      if (np.length < 6) { showMsg("Password must be at least 6 characters.", "error"); return; }
      if (np !== cp) { showMsg("Passwords don't match.", "error"); return; }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Updating…";

      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: np }),
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById("resetForm").style.display = "none";
          showMsg("Password updated. You can now sign in to Double Check with your new password.", "success");
        } else {
          showMsg(data.detail || "Something went wrong. Please request a new reset link.", "error");
          btn.disabled = false;
          btn.textContent = "Update password";
        }
      } catch {
        showMsg("Could not connect. Please check your internet connection.", "error");
        btn.disabled = false;
        btn.textContent = "Update password";
      }
    });

    // Show error immediately if no token present
    if (!getToken()) {
      showMsg("No reset token found. Please use the link from your email.", "error");
      document.getElementById("submitBtn").disabled = true;
    }
  </script>
</body>
</html>
